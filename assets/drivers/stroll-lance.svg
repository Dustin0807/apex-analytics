<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Background -->
  <rect width="200" height="240" rx="8" fill="#0F0F18"/>
  <!-- Team colour top band -->
  <rect width="200" height="6" rx="0" fill="#2A7A5E"/>
  <!-- Large initials circle -->
  <circle cx="100" cy="110" r="72" fill="#2A7A5E" opacity="0.12"/>
  <circle cx="100" cy="110" r="68" fill="none" stroke="#2A7A5E" stroke-width="1.5" opacity="0.3"/>
  <!-- Initials -->
  <text x="100" y="128"
        font-family="'Arial Black', sans-serif"
        font-size="52"
        font-weight="900"
        fill="#2A7A5E"
        text-anchor="middle"
        letter-spacing="-2">LS</text>
  <!-- Name strip -->
  <rect y="198" width="200" height="42" rx="0" fill="#2A7A5E" opacity="0.15"/>
  <text x="100" y="225"
        font-family="Arial, sans-serif"
        font-size="11"
        font-weight="700"
        fill="#2A7A5E"
        text-anchor="middle"
        letter-spacing="1.5">LANCE STROLL</text>
  <!-- Photo placeholder label -->
  <text x="100" y="180"
        font-family="Arial, sans-serif"
        font-size="8"
        fill="#2A7A5E"
        text-anchor="middle"
        opacity="0.4"
        letter-spacing="1">PHOTO PENDING</text>
</svg>