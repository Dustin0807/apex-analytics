<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standings — APEX Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/apex.css">
  <style>
    .standings-page { position:relative; z-index:1; }

    .series-switcher {
      display:flex; gap:2px; flex-wrap:wrap;
      padding:20px var(--pad) 0;
    }
    .series-switch-btn {
      padding:8px 20px;
      font-family:'JetBrains Mono',monospace;
      font-size:8px; letter-spacing:2px; text-transform:uppercase;
      color:var(--dim); background:none;
      border:1px solid var(--border);
      transition:all .18s; cursor:pointer;
    }
    .series-switch-btn:hover { color:var(--muted); border-color:var(--border-hi); }
    .series-switch-btn.active {
      color:var(--accent);
      border-color:rgba(var(--accent-rgb),.4);
      background:rgba(var(--accent-rgb),.05);
    }

    .year-strip {
      display:flex; align-items:center; gap:6px;
      padding:12px var(--pad) 0;
    }
    .year-strip-label {
      font-family:'JetBrains Mono',monospace;
      font-size:8px; letter-spacing:2px; text-transform:uppercase;
      color:var(--dim); margin-right:6px;
    }
    .year-btn {
      padding:5px 14px;
      font-family:'JetBrains Mono',monospace;
      font-size:9px; letter-spacing:2px;
      background:none; border:1px solid var(--border);
      color:var(--dim); transition:all .18s; cursor:pointer;
    }
    .year-btn:hover { color:var(--muted); border-color:var(--border-hi); }
    .year-btn.active {
      color:var(--accent);
      border-color:rgba(var(--accent-rgb),.4);
      background:rgba(var(--accent-rgb),.05);
    }

    .standings-layout {
      display:grid;
      grid-template-columns:1fr 320px;
      gap:2px;
      padding:var(--pad);
      padding-top:28px;
      padding-bottom:80px;
      max-width:var(--max-w);
      margin:0 auto;
    }
    .standings-sidebar {}
    .sidebar-sticky {
      position:sticky;
      top:calc(var(--nav-h) + 16px);
    }

    @media(max-width:900px) {
      .standings-layout { grid-template-columns:1fr; }
      .sidebar-sticky { position:static; }
    }
  </style>
</head>
<body>

  <div class="bg-radial-acc" style="--accent-rgb:39,244,210"></div>
  <div class="bg-checker"></div>

  <!-- NAV -->
  <nav class="apex-nav">
    <a class="nav-logo" href="index.html">APEX<span class="dot">.</span>ANALYTICS</a>
    <div id="nav-breadcrumb" class="nav-breadcrumb">
      <a href="index.html">Home</a>
    </div>
    <div class="nav-links">
      <a class="nav-link" href="index.html">Hub</a>
      <a class="nav-link" href="race.html">Race</a>
      <a class="nav-link active" href="standings.html">Standings</a>
    </div>
  </nav>

  <div class="standings-page">

    <!-- SERIES SWITCHER -->
    <div class="series-switcher">
      <button class="series-switch-btn" data-series="f1">Formula 1</button>
      <button class="series-switch-btn" data-series="nascar-cup">Cup Series</button>
      <button class="series-switch-btn" data-series="nascar-xfinity">Xfinity</button>
      <button class="series-switch-btn" data-series="nascar-trucks">Trucks</button>
    </div>

    <!-- YEAR PICKER -->
    <div class="year-strip" id="year-strip">
      <span class="year-strip-label">Season</span>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="standings-layout">

      <!-- Left: tables -->
      <div>
        <div id="standings-main">
          <div style="padding:40px 0;opacity:.25;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim)">Loading…</div>
        </div>
      </div>

      <!-- Right: schedule -->
      <div class="standings-sidebar">
        <div class="sidebar-sticky">
          <div id="standings-schedule"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer class="apex-footer" style="position:relative;z-index:1">
    <div class="foot-logo">APEX<span class="dot">.</span>ANALYTICS</div>
    <div class="foot-copy" id="footer-copy">APEX Analytics</div>
  </footer>

  <script src="assets/apex.js"></script>
  <script>
    (async () => {
      const config = await loadJSON('data/config.json');
      if (!config) return;

      const p    = params();
      const year = p.year || config.site.current_year;

      // Mark active series button and set accent colour immediately
      const seriesCfg = config.series[p.series];
      if (seriesCfg) {
        const accent = seriesCfg.accent || seriesCfg.color || '#FFFFFF';
        document.documentElement.style.setProperty('--accent', accent);
        document.documentElement.style.setProperty('--accent-rgb',
          accent.replace('#','').match(/.{2}/g).map(x=>parseInt(x,16)).join(','));
      }

      document.querySelectorAll('.series-switch-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.series === p.series);
      });

      // Year picker
      const years     = seriesCfg?.years || [year];
      const yearStrip = document.getElementById('year-strip');
      years.forEach(y => {
        const btn = document.createElement('button');
        btn.className   = 'year-btn' + (y === year ? ' active' : '');
        btn.textContent = y;
        btn.onclick     = () => location.href = `standings.html?series=${p.series}&year=${y}`;
        yearStrip.appendChild(btn);
      });

      await initStandingsPage();

      const foot = document.getElementById('footer-copy');
      if (foot && seriesCfg) foot.textContent = `${seriesCfg.name} · ${year} Standings`;
    })();
  </script>
</body>
</html>
