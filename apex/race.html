<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Analysis — APEX Analytics</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <!-- APEX Design System -->
  <link rel="stylesheet" href="assets/apex.css">
</head>
<body>

  <!-- Background layers -->
  <div class="bg-radial-acc"></div>
  <div class="bg-checker"></div>

  <!-- ── NAV ─────────────────────────────────────────────── -->
  <nav class="apex-nav">
    <a class="nav-logo" href="index.html">APEX<span class="dot">.</span></a>
    <div id="nav-breadcrumb" class="nav-breadcrumb">
      <a href="index.html">Home</a>
    </div>
    <div class="nav-links">
      <a class="nav-link" href="index.html">Hub</a>
      <a class="nav-link active" href="#">Race</a>
      <a class="nav-link" href="standings.html">Standings</a>
    </div>
  </nav>

  <!-- ── HERO ─────────────────────────────────────────────── -->
  <div class="race-hero relative" id="race-hero">
    <!-- Rendered by apex.js: renderHero() -->
    <div style="padding:20px 0;opacity:.3;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)">Loading…</div>
  </div>

  <!-- ── STATS BAR ─────────────────────────────────────────── -->
  <div class="stats-bar relative" id="stats-bar">
    <!-- Rendered by apex.js: renderStatsBar() -->
  </div>

  <!-- ── TAB BAR ───────────────────────────────────────────── -->
  <div class="tab-bar relative" id="tab-bar">
    <!-- Rendered by apex.js: initRacePage() -->
  </div>

  <!-- ── TAB PANELS ────────────────────────────────────────── -->
  <main class="relative" id="tab-content">
    <!-- Rendered by apex.js: one .panel per tab -->
  </main>

  <!-- ── FOOTER ────────────────────────────────────────────── -->
  <footer class="apex-footer relative">
    <div class="foot-logo">APEX<span class="dot">.</span></div>
    <div class="foot-copy" id="footer-copy">APEX Analytics</div>
  </footer>

  <!-- ── RENDERER ──────────────────────────────────────────── -->
  <script src="assets/apex.js"></script>
  <script>
    initRacePage();
  </script>

</body>
</html>
