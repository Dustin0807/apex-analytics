<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Circuits — APEX Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/apex.css">
  <style>
    .circuits-page { position:relative; z-index:1; padding:var(--pad); padding-bottom:80px; }

    .circuits-header {
      padding-bottom:24px; border-bottom:1px solid var(--border); margin-bottom:28px;
    }
    .circuits-h1 {
      font-family:'Bebas Neue',display;
      font-size:clamp(40px,6vw,80px);
      letter-spacing:2px; line-height:.9; margin-bottom:8px;
    }
    .circuits-h1 .acc { color:var(--accent); }
    .circuits-sub {
      font-family:'JetBrains Mono',monospace; font-size:9px;
      letter-spacing:2px; text-transform:uppercase; color:var(--dim);
    }

    /* Tier sections */
    .tier-label {
      font-family:'JetBrains Mono',monospace; font-size:8px;
      letter-spacing:3px; text-transform:uppercase;
      margin:28px 0 12px; display:flex; align-items:center; gap:12px;
    }
    .tier-label::after { content:''; flex:1; height:1px; background:var(--border); }
    .tier-label.t1 { color:#FFD700; }
    .tier-label.t2 { color:var(--muted); }
    .tier-label.t3 { color:var(--dim); }

    /* Circuit cards grid */
    .circuits-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
      gap:2px;
    }
    .circuit-card {
      background:var(--surface); border:1px solid var(--border);
      padding:18px 20px; text-decoration:none; color:inherit;
      display:block; transition:border-color .18s; position:relative; overflow:hidden;
    }
    .circuit-card:hover { border-color:rgba(var(--accent-rgb),.4); }
    .circuit-card.t1 { border-left:3px solid #FFD700; }
    .circuit-card.t2 { border-left:3px solid var(--border-hi); }
    .circuit-card.t3 { border-left:3px solid var(--border); }

    .cc-bg-word {
      position:absolute; right:-8px; top:-8px;
      font-family:'Bebas Neue',display; font-size:80px;
      color:rgba(255,255,255,.02); line-height:1; pointer-events:none;
    }
    .cc-round {
      font-family:'JetBrains Mono',monospace; font-size:8px;
      letter-spacing:2px; text-transform:uppercase; color:var(--dim);
      margin-bottom:8px;
    }
    .cc-name {
      font-family:'Bebas Neue',display; font-size:20px;
      letter-spacing:.5px; line-height:1.1; margin-bottom:4px;
    }
    .cc-location {
      font-family:'JetBrains Mono',monospace; font-size:9px;
      color:var(--muted); margin-bottom:10px;
    }
    .cc-facts {
      display:flex; gap:14px;
      font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--dim);
    }
    .cc-fact strong { color:var(--text); font-weight:400; }
    .cc-result {
      margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,.04);
      font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted);
    }
    .cc-result .winner { color:var(--accent); font-weight:500; }
    .cc-cta {
      position:absolute; bottom:14px; right:16px;
      font-family:'JetBrains Mono',monospace; font-size:8px;
      letter-spacing:1.5px; text-transform:uppercase;
      color:var(--accent); opacity:0; transition:opacity .18s;
    }
    .circuit-card:hover .cc-cta { opacity:.7; }

    @media(max-width:600px) {
      .circuits-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-radial-acc" style="--accent-rgb:39,244,210"></div>
  <div class="bg-checker"></div>

  <nav class="apex-nav">
    <a class="nav-logo" href="index.html">APEX<span class="dot">.</span>ANALYTICS</a>
    <div id="nav-breadcrumb" class="nav-breadcrumb">
      <a href="index.html">Home</a>
      <span class="sep">/</span>
      <span class="current">Circuits</span>
    </div>
    <div class="nav-links">
      <a class="nav-link" href="index.html">Hub</a>
      <a class="nav-link" href="standings.html?series=f1">Standings</a>
      <a class="nav-link active" href="circuits.html?series=f1">Circuits</a>
      <a class="nav-link" href="season.html?series=f1">Stats</a>
      <a class="nav-link" href="compare.html?series=f1">Compare</a>
    </div>
  </nav>

  <div class="circuits-page" id="circuits-page">
    <div style="opacity:.25;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim)">Loading…</div>
  </div>

  <footer class="apex-footer" style="position:relative;z-index:1">
    <div class="foot-logo">APEX<span class="dot">.</span>ANALYTICS</div>
    <div class="foot-copy" id="footer-copy">APEX Analytics</div>
  </footer>

  <script src="assets/apex.js"></script>
  <script>initCircuitsPage();</script>
</body>
</html>
