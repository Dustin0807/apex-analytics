<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Analysis — APEX Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <link rel="stylesheet" href="assets/apex.css">
</head>
<body>

  <!-- Background — accent set by JS once series is known -->
  <div class="bg-radial-acc" id="bg-radial" style="--accent-rgb:39,244,210"></div>
  <div class="bg-checker"></div>

  <!-- NAV -->
  <nav class="apex-nav">
    <a class="nav-logo" href="index.html">APEX<span class="dot">.</span>ANALYTICS</a>
    <div id="nav-breadcrumb" class="nav-breadcrumb">
      <a href="index.html">Home</a>
    </div>
    <div class="nav-links">
      <a class="nav-link" href="index.html">Hub</a>
      <a class="nav-link active" href="#">Race</a>
      <a class="nav-link" href="standings.html">Standings</a>
    </div>
  </nav>

  <!-- HERO — populated by apex.js -->
  <div class="race-hero" id="race-hero" style="min-height:260px;position:relative;z-index:1">
    <div style="opacity:.25;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);padding:20px 0">Loading race data…</div>
  </div>

  <!-- STATS BAR — populated by apex.js -->
  <div class="stats-bar" id="stats-bar" style="position:relative;z-index:1"></div>

  <!-- TAB BAR — built by apex.js -->
  <div class="tab-bar" id="tab-bar" style="position:relative;z-index:2"></div>

  <!-- TAB PANELS — built by apex.js -->
  <main id="tab-content" style="position:relative;z-index:1"></main>

  <!-- FOOTER -->
  <footer class="apex-footer" style="position:relative;z-index:1">
    <div class="foot-logo">APEX<span class="dot">.</span>ANALYTICS</div>
    <div class="foot-copy" id="footer-copy">APEX Analytics</div>
  </footer>

  <script src="assets/apex.js"></script>
  <script>initRacePage();</script>
</body>
</html>
